name: Deploy to EC2

on:
  push:
    branches:
      - master   # IMPORTANT: matches your branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # updated version (fixes Node warning)

    - name: Create SSH key
      run: |
        echo "${{ secrets.EC2_KEY }}" > key.pem
        chmod 600 key.pem

    - name: Deploy to EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
        
        # Go to home
        cd ~

        # If folder doesn't exist → clone repo
        if [ ! -d "ai-devops-platform" ]; then
          git clone https://github.com/chauhanvedika/ai-devops-app.git ai-devops-platform
        fi

        cd ai-devops-platform

        # Pull latest code (IMPORTANT: master, not main)
        git pull origin master

        # Stop & remove ALL containers (avoid port conflict)
        docker stop $(docker ps -aq) || true
        docker rm $(docker ps -aq) || true

        # Build new image
        docker build -t ai-devops-app .

        # Run container
        docker run -d -p 5000:5000 --name ai-app ai-devops-app

        EOF